<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="블랙홀, 빅뱅, 태양계, 별자리 — 누구나 이해할 수 있는 기초 천문학 지식 플랫폼" />
  <title>기초 지식 | Radiant Blue Dot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .knowledge-hero {
      padding: 5rem 2rem 3rem;
      text-align: center;
      background: radial-gradient(ellipse at center top, rgba(247,201,72,0.07) 0%, transparent 65%);
    }
    .knowledge-hero .hero-tag {
      display: inline-block;
      background: rgba(247,201,72,0.12);
      border: 1px solid rgba(247,201,72,0.3);
      color: var(--color-accent-gold);
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .knowledge-hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; margin-bottom: 0.75rem; }
    .knowledge-hero p { color: var(--color-text-muted); font-size: 1rem; max-width: 540px; margin: 0 auto; line-height: 1.8; }

    #knowledge-hub-wrap { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }
    #knowledge-hub {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .hub-card {
      background: var(--gradient-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.25rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: fadeInUp 0.5s both;
    }
    .hub-card:hover { transform: translateY(-6px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .hub-solar:hover        { border-color: rgba(255,180,0,0.5); }
    .hub-celestial:hover    { border-color: rgba(140,190,255,0.5); }
    .hub-astrophysics:hover { border-color: rgba(60,220,180,0.5); }
    .hub-exploration:hover  { border-color: rgba(255,100,100,0.5); }
    .hub-constellation:hover{ border-color: rgba(180,130,255,0.5); }
    .hub-telescope:hover    { border-color: rgba(255,200,100,0.5); }
    .hub-astronomer:hover   { border-color: rgba(100,220,160,0.5); }

    .hub-icon-wrap { font-size: 2.2rem; margin-bottom: 0.75rem; display: inline-block; }
    .hub-icon-wrap.float { animation: hubFloat 3s ease-in-out infinite alternate; }
    @keyframes hubFloat { 0%{transform:translateY(0)} 100%{transform:translateY(-8px)} }
    .hub-card-name  { font-weight: 800; font-size: 1rem; margin-bottom: 0.25rem; }
    .hub-card-count { font-size: 0.78rem; color: var(--color-text-muted); }

    #subcategory-panel { display: none; max-width: 860px; margin: 0 auto; padding: 0 2rem 4rem; }
    #subcategory-panel.active { display: block; animation: fadeInUp 0.35s both; }
    .subcategory-breadcrumb {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--color-text-muted); font-size: 0.85rem; cursor: pointer;
      padding: 0.5rem 0; margin-bottom: 1.5rem; transition: color 0.2s;
    }
    .subcategory-breadcrumb:hover { color: var(--color-accent-gold); }
    .subcategory-breadcrumb span { color: var(--color-text); font-weight: 700; }
    .subcategory-title-bar { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 2rem; }
    .cat-icon-lg { width: 58px; height: 58px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
    .subcategory-title-bar h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.2rem; }
    .subcategory-title-bar p  { font-size: 0.85rem; color: var(--color-text-muted); }
    .subcategory-grid { display: flex; flex-direction: column; gap: 0.75rem; }
    .subcat-item {
      display: flex; align-items: center; gap: 1rem;
      background: var(--gradient-card); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: 1rem 1.25rem; cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .subcat-item:hover { border-color: var(--color-accent-gold); transform: translateX(4px); }
    .subcat-icon { font-size: 1.5rem; flex-shrink: 0; }
    .subcat-info { flex: 1; }
    .subcat-name    { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.15rem; }
    .subcat-preview { font-size: 0.8rem; color: var(--color-text-muted); }
    .subcat-arrow   { color: var(--color-accent-gold); font-size: 1rem; }

    #teaser-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #teaser-overlay.open { opacity: 1; pointer-events: auto; }
    .teaser-box {
      background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 3rem 2.5rem;
      max-width: 540px; width: 100%;
      text-align: center; position: relative;
      animation: scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes scaleIn { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
    .teaser-close {
      position: absolute; top: 1rem; right: 1.25rem;
      background: none; border: none; color: var(--color-text-muted);
      font-size: 1.4rem; cursor: pointer; transition: color 0.2s;
    }
    .teaser-close:hover { color: #fff; }
    .teaser-big-icon { font-size: 4rem; margin-bottom: 0.5rem; animation: hubFloat 2.5s ease-in-out infinite alternate; display: block; }
    #teaser-badge {
      display: inline-block;
      background: rgba(247,201,72,0.15); border: 1px solid rgba(247,201,72,0.3);
      color: var(--color-accent-gold); padding: 0.2rem 0.8rem;
      border-radius: 2rem; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.08em; margin-bottom: 0.75rem;
    }
    #teaser-name  { font-size: 1.5rem; font-weight: 900; margin-bottom: 1.25rem; }
    #teaser-hook  { font-size: 0.95rem; color: #ccc; line-height: 1.9; margin-bottom: 2rem; text-align: left; }
    .hook-highlight { color: #7ee8e8; font-weight: 600; }
    .hook-gold      { color: var(--color-accent-gold); font-weight: 700; }
    .btn-deep-dive {
      background: linear-gradient(135deg, var(--color-accent-gold), #e0a020);
      color: #0a0a14; border: none; border-radius: 50px;
      padding: 0.85rem 2.5rem; font-size: 0.95rem; font-weight: 800;
      cursor: pointer; transition: opacity 0.2s, transform 0.2s;
    }
    .btn-deep-dive:hover { opacity: 0.9; transform: translateY(-2px); }

    #reader-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: #0a0a14;
      overflow-y: auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #reader-overlay.open { opacity: 1; pointer-events: auto; animation: readerOpen 0.3s ease; }
    @keyframes readerOpen { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .reader-topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,20,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .reader-progress {
      position: absolute; bottom: 0; left: 0; height: 2px; width: 0;
      background: linear-gradient(90deg, var(--color-accent-cyan), var(--color-accent-gold));
      transition: width 0.1s;
    }
    .reader-back-btn {
      background: none; border: 1px solid var(--color-border);
      color: var(--color-text-muted); border-radius: 8px;
      padding: 0.35rem 0.85rem; font-size: 0.8rem; cursor: pointer;
      transition: color 0.2s, border-color 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .reader-back-btn:hover { color: #fff; border-color: #fff; }
    .reader-topbar-title {
      flex: 1; font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .reader-actions { display: flex; gap: 0.5rem; }
    .reader-action-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--color-border);
      color: var(--color-text-muted); border-radius: 8px;
      padding: 0.35rem 0.75rem; font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .reader-action-btn:hover  { border-color: var(--color-accent-cyan); color: var(--color-accent-cyan); }
    .reader-action-btn.liked  { border-color: #e05c8a; color: #e05c8a; background: rgba(224,92,138,0.1); }
    .reader-action-btn.saved  { border-color: var(--color-accent-gold); color: var(--color-accent-gold); background: rgba(247,201,72,0.1); }
    .reader-action-btn.active { border-color: var(--color-accent-cyan); color: var(--color-accent-cyan); background: rgba(100,200,220,0.1); }
    .reader-content { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 6rem; }
    .reader-content .article-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .reader-content h1 { font-size: clamp(1.5rem, 3.5vw, 2.2rem); font-weight: 900; margin-bottom: 0.75rem; line-height: 1.35; }
    .reader-content .reader-meta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--color-text-muted);
      margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--color-border);
    }
    .reader-body p  { font-size: 1.05rem; line-height: 2; color: #ccc; margin-bottom: 1.5rem; }
    .reader-body h2 { font-size: 1.4rem; font-weight: 800; margin: 2.5rem 0 1rem; }
    .reader-body h3 { font-size: 1.15rem; font-weight: 700; margin: 2rem 0 0.75rem; color: var(--color-accent-cyan); }
    .reader-body ul, .reader-body ol { padding-left: 1.5rem; margin-bottom: 1.5rem; }
    .reader-body li { font-size: 0.97rem; line-height: 1.8; color: #ccc; margin-bottom: 0.4rem; }
    .hl      { background: rgba(126,232,232,0.15); border-bottom: 1px solid rgba(126,232,232,0.4); border-radius: 3px; padding: 0 3px; color: #7ee8e8; }
    .hl-blue { background: rgba(79,142,247,0.15);  border-bottom: 1px solid rgba(79,142,247,0.4);  border-radius: 3px; padding: 0 3px; color: #7fb5ff; }
    .hl-gold { background: rgba(247,201,72,0.15);  border-bottom: 1px solid rgba(247,201,72,0.4);  border-radius: 3px; padding: 0 3px; color: var(--color-accent-gold); }
    .callout {
      background: linear-gradient(135deg, rgba(126,232,232,0.07), rgba(79,142,247,0.05));
      border-left: 3px solid var(--color-accent-cyan);
      border-radius: 0 12px 12px 0;
      padding: 1rem 1.25rem; margin: 1.5rem 0;
      font-size: 0.92rem; line-height: 1.8; color: #ccc;
    }
    .callout .callout-icon { display: block; font-weight: 700; color: var(--color-accent-cyan); margin-bottom: 0.35rem; font-size: 0.85rem; }
    .formula-block {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(126,232,232,0.25); border-radius: 12px;
      padding: 1.25rem 1.5rem; margin: 1.5rem 0; text-align: center;
    }
    .formula-text { font-size: 1.6rem; font-weight: 900; color: #7ee8e8; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .formula-desc { font-size: 0.82rem; color: var(--color-text-muted); }
    .fact-box {
      background: rgba(247,201,72,0.05); border: 1px solid rgba(247,201,72,0.2); border-radius: 12px;
      padding: 1rem 1.25rem; margin: 1.5rem 0; font-size: 0.9rem; line-height: 1.7; color: #ddd;
    }
    .humanistic-close {
      border-top: 1px solid var(--color-border);
      padding-top: 2rem; margin-top: 3rem; text-align: center;
    }
    .hc-label { display: block; font-size: 0.8rem; color: var(--color-accent-gold); letter-spacing: 0.1em; font-weight: 700; margin-bottom: 0.75rem; text-transform: uppercase; }
    .humanistic-close p { font-size: 1rem; color: #bbb; line-height: 1.9; font-style: italic; }

    #tts-bar {
      position: sticky; bottom: 0; left: 0; right: 0;
      background: rgba(15,15,28,0.95); backdrop-filter: blur(12px);
      border-top: 1px solid var(--color-border);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      transform: translateY(100%); transition: transform 0.3s;
    }
    #tts-bar.open { transform: translateY(0); }
    .tts-play-btn {
      background: var(--color-accent-cyan); border: none; border-radius: 50%;
      width: 38px; height: 38px; flex-shrink: 0;
      font-size: 1rem; cursor: pointer; color: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .tts-track { flex: 1; background: rgba(255,255,255,0.1); border-radius: 10px; height: 4px; overflow: hidden; }
    #tts-fill  { height: 100%; background: var(--color-accent-cyan); width: 0; transition: width 0.3s; }
    .tts-speed { background: rgba(255,255,255,0.06); border: 1px solid var(--color-border); border-radius: 6px; color: #ccc; padding: 0.25rem 0.5rem; font-size: 0.8rem; }

    .reader-related { padding-top: 2rem; border-top: 1px solid var(--color-border); margin-top: 3rem; }
    .reader-related h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
    .related-card {
      background: var(--gradient-card); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: 1rem; cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .related-card:hover { border-color: var(--color-accent-cyan); transform: translateY(-3px); }
    .rel-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }
    .rel-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .rel-cat  { font-size: 0.75rem; color: var(--color-text-muted); }

    .algo-section { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }
    .algo-section-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 1.25rem; }
    .algo-feed { display: flex; flex-direction: column; gap: 0.6rem; }
    .algo-item {
      display: flex; align-items: center; gap: 1rem;
      background: var(--gradient-card); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: 0.85rem 1.25rem; cursor: pointer;
      transition: border-color 0.2s;
    }
    .algo-item:hover { border-color: rgba(126,232,232,0.4); }
    .algo-icon  { font-size: 1.4rem; flex-shrink: 0; }
    .algo-info  { flex: 1; }
    .algo-name  { font-weight: 700; font-size: 0.9rem; }
    .algo-meta  { font-size: 0.75rem; color: var(--color-text-muted); }
    .algo-badge { background: rgba(126,232,232,0.1); border: 1px solid rgba(126,232,232,0.25); color: var(--color-accent-cyan); padding: 0.15rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 700; }

    .login-prompt {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(20,20,35,0.95); border: 1px solid var(--color-border);
      color: #ccc; padding: 0.75rem 1.5rem; border-radius: 50px;
      font-size: 0.85rem; opacity: 0; pointer-events: none;
      transition: all 0.3s; z-index: 9999; white-space: nowrap;
    }
    .login-prompt.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .nav-user { margin-left: auto; }
    .btn-login {
      background: rgba(247,201,72,0.1); border: 1px solid rgba(247,201,72,0.3);
      color: var(--color-accent-gold); border-radius: 2rem;
      padding: 0.4rem 1.1rem; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: rgba(247,201,72,0.2); }

    @media (max-width: 600px) {
      .teaser-box { padding: 2rem 1.5rem; }
      #teaser-name { font-size: 1.3rem; }
    }

    /* ── Chapter navigation system ── */
    .chapter-nav { display:flex; flex-wrap:wrap; gap:0.5rem; margin:3rem 0 1.5rem; padding-top:2rem; border-top:1px solid var(--color-border); }
    .chapter-nav-title { width:100%; font-size:0.72rem; font-weight:700; color:var(--color-accent-gold); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.25rem; }
    .chapter-btn { background:rgba(255,255,255,0.04); border:1px solid var(--color-border); color:var(--color-text-muted); border-radius:8px; padding:0.45rem 0.9rem; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif; }
    .chapter-btn:hover { color:#fff; border-color:rgba(255,255,255,0.25); }
    .chapter-btn.active { background:rgba(126,232,232,0.1); border-color:var(--color-accent-cyan); color:var(--color-accent-cyan); }
    .chapter-body { animation:fadeChapter 0.22s ease; }
    @keyframes fadeChapter { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .chapter-breadcrumb { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.8rem; color:var(--color-text-muted); margin-bottom:1rem; cursor:pointer; transition:color 0.2s; }
    .chapter-breadcrumb:hover { color:#fff; }
    .term-note { display:block; font-size:0.75rem; color:#666; margin-top:-1rem; margin-bottom:1.25rem; font-style:italic; line-height:1.6; }
    .term-note::before { content:'▸ '; color:#555; }
  </style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a class="nav-logo brand-logo" href="index.html" aria-label="Radiant Blue Dot home"><span class="brand-rad">Rad</span><span class="brand-blue">Blue</span>&thinsp;<span class="brand-dot">•</span></a>
    <div class="nav-links">
      <a href="index.html">홈</a>
      <a href="trends.html">개발 동향</a>
      <a href="knowledge.html" class="active">천문 지식</a>
    </div>
    <div class="nav-user">
      <button class="btn-login" onclick="handleLogin()">🔐 로그인</button>
    </div>
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">홈</a>
    <a href="trends.html">개발 동향</a>
    <a href="knowledge.html" class="active">천문 지식</a>
  </div>
</nav>

<section class="knowledge-hero">
  <div class="hero-tag">⭐ 기초 천문 지식</div>
  <h1>우주는 <span class="text-gradient">누구의 것</span>도 아니에요</h1>
  <p>어렵고 멀게만 느껴졌던 천문학을<br>쉽고 감동적인 언어로 탐험해보세요</p>
</section>

<div id="knowledge-hub-wrap">
  <div id="knowledge-hub"></div>
</div>

<div id="subcategory-panel"></div>

<!-- Teaser overlay -->
<div id="teaser-overlay" role="dialog" aria-modal="true">
  <div class="teaser-box">
    <button class="teaser-close" onclick="closeTeaserModal()" aria-label="닫기">✕</button>
    <span class="teaser-big-icon" id="teaser-icon">🌌</span>
    <div id="teaser-badge">카테고리</div>
    <h2 id="teaser-name">제목</h2>
    <div id="teaser-hook"></div>
    <button class="btn-deep-dive" id="btn-deep-dive">더 깊은 우주속으로 ✦</button>
  </div>
</div>

<!-- Reader overlay -->
<div id="reader-overlay" role="dialog" aria-modal="true">
  <div class="reader-topbar">
    <button class="reader-back-btn" onclick="closeReader()">← 돌아가기</button>
    <div class="reader-topbar-title" id="reader-title-small"></div>
    <div class="reader-actions">
      <button class="reader-action-btn" id="btn-tts" onclick="toggleTTS()">🔊 듣기</button>
      <button class="reader-action-btn" id="btn-like" onclick="toggleLike('current')">♡ 좋아요</button>
      <button class="reader-action-btn" id="btn-save" onclick="toggleSave('current')">🔖 저장</button>
    </div>
    <div class="reader-progress" id="reader-progress-bar"></div>
  </div>
  <div class="reader-content">
    <div class="article-tags" id="reader-tags"></div>
    <h1 id="reader-title"></h1>
    <div class="reader-meta" id="reader-meta"></div>
    <div class="reader-body" id="reader-body"></div>
    <div class="reader-related" id="reader-related"></div>
  </div>
  <div id="tts-bar">
    <button class="tts-play-btn" onclick="toggleTTS()">▶</button>
    <div class="tts-track"><div id="tts-fill"></div></div>
    <select class="tts-speed" onchange="setTTSSpeed(this)">
      <option value="0.8">0.8×</option>
      <option value="1.0" selected>1.0×</option>
